<style>
    .group {
        display: flex;
        flex-direction: row;
        width: 100%;
    }
    label {
        display: flex;
        flex-direction: column;
        justify-items: center;
        align-items: center;
        padding: 1%;
        gap: 10px;
    }

    .element-group {
        padding: 10%;
        border: 1px;
        border-radius: 25px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
        width: 100%;
        gap: 2px;
    }
</style>

<form id="theme-color-picker">
    <h2>Core Theme Colors</h2>
    <h3>Background & Text</h3>
    <div class="group">
        <label
            >BG 50 <input type="color" data-var="--color-bg-50" value="#d1d1d6"
        /></label>
        <label
            >BG 500
            <input type="color" data-var="--color-bg-500" value="#2b2b31"
        /></label>
        <label
            >BG 950
            <input type="color" data-var="--color-bg-950" value="#050505"
        /></label>
        <br />
        <label
            >Text 100
            <input type="color" data-var="--color-text-100" value="#ededed"
        /></label>
        <label
            >Text 500
            <input type="color" data-var="--color-text-500" value="#b3b3b3"
        /></label>
        <label
            >Text 900
            <input type="color" data-var="--color-text-900" value="#404040"
        /></label>
    </div>
    <h3>Primary Brand</h3>
    <div class="group">
        <label
            >Primary 300
            <input type="color" data-var="--color-primary-300" value="#84dcd0"
        /></label>
        <label
            >Primary 500
            <input type="color" data-var="--color-primary-500" value="#4caea1"
        /></label>
        <label
            >Primary 700
            <input type="color" data-var="--color-primary-700" value="#3a5955"
        /></label>
    </div>
    <hr />
    <h2>Accent Palettes (Shade 500)</h2>
    <div class="group">
        <label
            >Red <input type="color" data-var="--color-red-500" value="#ff6666"
        /></label>
        <label
            >Orange
            <input type="color" data-var="--color-orange-500" value="#ffa64d"
        /></label>
        <label
            >Yellow
            <input type="color" data-var="--color-yellow-500" value="#ffff4d"
        /></label>
        <label
            >Lime
            <input type="color" data-var="--color-lime-500" value="#a6ff4d"
        /></label>
        <label
            >Green
            <input type="color" data-var="--color-green-500" value="#4dff4d"
        /></label>
        <label
            >Teal
            <input type="color" data-var="--color-teal-500" value="#14b8a6"
        /></label>
        <label
            >Cyan
            <input type="color" data-var="--color-cyan-500" value="#4dffff"
        /></label>
        <label
            >Sky <input type="color" data-var="--color-sky-500" value="#0ea5e9"
        /></label>
        <label
            >Blue
            <input type="color" data-var="--color-blue-500" value="#4d4dff"
        /></label>
        <label
            >Indigo
            <input type="color" data-var="--color-indigo-500" value="#6366f1"
        /></label>
        <label
            >Purple
            <input type="color" data-var="--color-purple-500" value="#a64dff"
        /></label>
        <label
            >Pink
            <input type="color" data-var="--color-pink-500" value="#ff4da6"
        /></label>
    </div>

    <div style="margin-top: 20px">
        <button type="button" id="export-css">Copy CSS Variables</button>
    </div>
</form>

<div class="group">
    <label
        >Example Sidebar
        <div
            class="sidebar no-selection focused-component has-focus"
            style="
                position: relative;
                height: 100%;
                display: flex;
                flex-direction: column;
                width: 252px;
            "

        >
            <div

            </div>

            <div class="sidebar--top">
                <div

                    class="sidebar-item sidebar-item-hoverable sidebar-item-workspaces"

                    <div
                        class="topbar--workspace id--workspace-button button-small button-none"

                            padding-right: 0px;
                            width: 100%;

                            align-items: center;
                            gap: 10px;
                            justify-content: center;
                            line-height: 1.3;
                        "
                    >
                        <span

                    </div>
                </div>
                <div
                    data-guid="id-div1"
                    class="sidebar-item collapsed-only sidebar-item-divider"
                ></div>
            </div>
            <div
                class="sidebar--body"
                style="
                    position: relative;
                    flex-grow: 1;
                    overflow-x: hidden;
                    overflow-y: hidden;
                "
            >
                <div
                    class="sidebar--icons"
                    style="

                        overflow-y: scroll;
                        scrollbar-width: none;

                        <span

                        <div

                            <span
                                class="ti ti-plus"
                                style="padding: 5px"
                            ></span>
                        </div>
                    </div>
                    <div
                        class="sidebar-item sidebar-item-hoverable sidebar-item-collection"
                    >

                        ></span>
                        <span
                            style="position: absolute; left: -2px"

                                data-tooltip="New Note..."

                            <div
                                style="display: inline-flex; padding: 5px"
                                class="cursor-pointer collapsed-hidden hover-button sidebar-item-hover-only is-option-menu"
                            >
                                <span class="ti ti-dots"></span>
                            </div>

                            data-tooltip="A Sample Note"
                            class="sidebar-item-icon tooltip"
                        >

                        </span>

                        <span class="sidebar-item-label collapsed-hidden"
                            >Focused Note</span
                        >

                        <div style="display: flex">
                            <div

                        <span

                    <div

                </div>
                <div

                        z-index: 1;

                        user-select: none;
                    "
                >
                    <div
                        class="vscrollbar-thumb scrollbar-thumb clickable"
                        style="
                            opacity: 0;
                            transform: translateY(0px);
                            height: 0px;

                    >
                        &nbsp;
                    </div>
                </div>
            </div>
        </div>
    </label>
