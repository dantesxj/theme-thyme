<div
    id="theme-editor"
    style="
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        box-sizing: border-box;
        padding: 15px;
        font-family: 'JetBrains Mono', monospace;
        color: var(--color-text-100);
        background: var(--color-bg-900);
        border-radius: 12px;
        border: 1px solid var(--color-bg-400);
        max-height: 95vh;
        overflow-y: auto;
    "
>
    <div
        style="
            display: flex;
            justify-content: space-between;
            align-items: center;
        "
    >
        <h2 style="margin: 0; font-size: 1rem; color: var(--color-primary-400)">
            Theme Architect
        </h2>
    </div>

    <div style="display: flex; gap: 6px; width: 100%">
        <select
            id="theme-preset"
            style="
                flex: 2;
                padding: 8px;
                background: var(--color-bg-700);
                color: var(--color-text-100);
                border: 1px solid var(--color-bg-400);
                border-radius: 4px;
                font-size: 12px;
            "
        ></select>
        <button
            id="reset-theme"
            style="
                flex: 1;
                padding: 8px;
                cursor: pointer;
                background: var(--color-bg-600);
                color: var(--color-text-100);
                border: 1px solid var(--color-bg-400);
                border-radius: 4px;
                font-size: 11px;
                font-weight: bold;
            "
        >
            🗑️ RESET
        </button>
    </div>

    <div style="display: flex; gap: 6px; width: 100%">
        <input
            id="theme-name"
            type="text"
            placeholder="theme-name"
            style="
                flex: 2;
                padding: 8px;
                background: var(--color-bg-800);
                color: var(--color-text-100);
                border: 1px solid var(--color-bg-400);
                border-radius: 4px;
                font-size: 12px;
            "
        />
        <select
            id="scheme-select"
            style="
                flex: 1;
                padding: 8px;
                background: var(--color-bg-800);
                color: var(--color-text-100);
                border: 1px solid var(--color-bg-400);
                border-radius: 4px;
                font-size: 12px;
            "
        >
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </select>
    </div>

    <div style="flex: 1; min-height: 300px; position: relative">
        <textarea
            id="css-input"
            spellcheck="false"
            placeholder="--color-name: #hex;"
            style="
                width: 100%;
                height: 100%;
                min-height: 400px;
                background: var(--color-bg-950);
                color: #cba6f7;
                border: 1px solid var(--color-bg-400);
                border-radius: 8px;
                padding: 12px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                line-height: 1.5;
                outline: none;
                resize: vertical;
            "
        ></textarea>
    </div>

    <button
        id="preview-css"
        style="
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background: var(--color-primary-400);
            color: var(--color-bg-900);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        "
    >
        PREVIEW
    </button>

    <button
        id="copy-css"
        style="
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background: var(--color-primary-400);
            color: var(--color-bg-900);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        "
    >
        COPY CSS
    </button>
</div>
